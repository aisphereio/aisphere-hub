name: Apply Sandbox Contract Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/apply-sandbox-contract-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Patch cluster-scoped template routes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('api/kubernetes/v1/sandbox.proto')
          text = path.read_text()

          replacements = {
              'get: "/v1/sandbox-templates/{id}" response_body: "template"':
                  'get: "/v1/clusters/{cluster_id}/sandbox-templates/{id}" response_body: "template"',
              'delete: "/v1/sandbox-templates/{id}"':
                  'delete: "/v1/clusters/{cluster_id}/sandbox-templates/{id}"',
              '''message GetSandboxTemplateRequest {
            string id = 1 [(google.api.field_behavior) = REQUIRED];
          }''':
                  '''message GetSandboxTemplateRequest {
            string id = 1 [(google.api.field_behavior) = REQUIRED];
            string cluster_id = 2 [(google.api.field_behavior) = REQUIRED];
          }''',
              '''message DeleteSandboxTemplateRequest {
            string id = 1 [(google.api.field_behavior) = REQUIRED];
            int64 expected_revision = 2 [(google.api.field_behavior) = REQUIRED];
          }''':
                  '''message DeleteSandboxTemplateRequest {
            string id = 1 [(google.api.field_behavior) = REQUIRED];
            int64 expected_revision = 2 [(google.api.field_behavior) = REQUIRED];
            string cluster_id = 3 [(google.api.field_behavior) = REQUIRED];
          }''',
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'expected sandbox contract fragment not found: {old!r}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY
      - name: Commit repair
        env:
          TARGET_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add api/kubernetes/v1/sandbox.proto
          git commit -m 'fix(sandbox): align template authz with cluster-scoped routes'
          git fetch origin "$TARGET_REF"
          git rebase "origin/$TARGET_REF"
          git push origin HEAD:"$TARGET_REF"
