name: Docker image

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional extra image tag to publish
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: hub-docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: aisphere-hub
  REGISTRY: registry.cn-beijing.aliyuncs.com
  NAMESPACE: ainfracn

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      # Keep compatibility with the original Hub secret names while also
      # supporting the standardized names used by IAM and the other services.
      ACR_USERNAME: ${{ secrets.ALIYUN_DOCKER_USERNAME || secrets.ALIYUN_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ALIYUN_DOCKER_PASSWORD || secrets.ALIYUN_PASSWORD }}
      # Feature/fix branches and pull requests only verify that the image builds.
      # Publishing is restricted to main, version tags, and explicit dispatches.
      SHOULD_PUSH: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Aliyun ACR credentials
        if: env.SHOULD_PUSH == 'true'
        shell: bash
        run: |
          if [[ -z "${ACR_USERNAME}" || -z "${ACR_PASSWORD}" ]]; then
            echo "::error::Aliyun ACR credentials are missing. Configure ALIYUN_DOCKER_USERNAME/ALIYUN_DOCKER_PASSWORD or the legacy ALIYUN_USERNAME/ALIYUN_PASSWORD secrets."
            exit 1
          fi

      - name: Login to Aliyun ACR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
