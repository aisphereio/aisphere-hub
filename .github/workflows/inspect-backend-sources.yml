name: Inspect Backend Sources

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/inspect-backend-sources.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: backend-repair-sources
          path: |
            api/kubernetes/v1/sandbox.proto
            internal/service/sandbox_service.go
          if-no-files-found: error
