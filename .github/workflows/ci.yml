name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: write

concurrency:
  group: hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout source branch
        run: |
          TARGET_BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git fetch origin "$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Update Soft Serve dependency
        run: |
          go get github.com/aisphereio/soft-serve@v0.0.0-20260721011708-31d466419f2b
          go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add go.mod go.sum
            git commit -m "chore(deps): update embedded Soft Serve"
            git push origin HEAD:"$TARGET_BRANCH"
          fi

      - name: Test
        run: go test ./... -count=1 -short

      - name: Build
        run: go build ./...

      - name: Render Kubernetes manifests
        run: kubectl kustomize deploy/k8s/base > /tmp/aisphere-hub-k8s.yaml

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-hub:${{ github.sha }} .
