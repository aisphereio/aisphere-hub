name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'

permissions:
  contents: write

concurrency:
  group: hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/iam-grpc-authz-contract
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply IAM gRPC authorization repair
        run: python3 .github/scripts/apply_iam_grpc_contract_fix.py

      - name: Format and normalize modules
        run: |
          gofmt -w internal/data/authz_runtime.go internal/data/authz_runtime_test.go internal/data/data.go internal/data/authz.go internal/data/authz_bootstrap.go internal/data/authz_bootstrap_test.go cmd/aisphere-hub/main.go
          go mod tidy

      - name: Test
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          go test ./... -count=1 -short 2>&1 | tee /tmp/hub-test.log

      - name: Persist failing test diagnostics
        if: steps.tests.outcome == 'failure'
        run: |
          cp /tmp/hub-test.log .github/hub-test-failure.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/hub-test-failure.log
          git commit -m "chore: capture Hub test failure"
          git push origin HEAD:fix/iam-grpc-authz-contract
          exit 1

      - name: Build
        run: go build ./...

      - name: Render Kubernetes manifests
        run: kubectl kustomize deploy/k8s/base > /tmp/aisphere-hub-k8s.yaml

      - name: Verify authorization deployment boundary
        run: |
          ! grep -R "provider: spicedb" deploy/config.yaml deploy/k8s/base/configmap.yaml
          grep -R "provider: iam_grpc" deploy/config.yaml deploy/k8s/base/configmap.yaml
          grep -R "aisphere-iam.aisphere.svc.cluster.local:19080" deploy/config.yaml deploy/k8s/base/configmap.yaml

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-hub:${{ github.sha }} .

      - name: Commit final repair
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/scripts/apply_iam_grpc_contract_fix.py .github/hub-test-failure.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --stat
          git commit -m "fix: route Hub authorization through IAM runtime API"
          git push origin HEAD:fix/iam-grpc-authz-contract
