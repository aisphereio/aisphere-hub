name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        shell: bash
        run: |
          set +e
          go test ./... -count=1 -short > /tmp/go-test.log 2>&1
          status=$?
          cat /tmp/go-test.log
          exit "$status"

      - name: Upload Go test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-log
          path: /tmp/go-test.log
          if-no-files-found: warn

      - name: Build
        run: go build ./...

      - name: Render Kubernetes manifests
        run: kubectl kustomize deploy/k8s/base > /tmp/aisphere-hub-k8s.yaml

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-hub:${{ github.sha }} .
