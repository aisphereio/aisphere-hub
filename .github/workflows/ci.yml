name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read

concurrency:
  group: hub-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  KERNEL_VERSION: v0.4.18

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize PR base branch for compatibility checks
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git branch --force "${BASE_REF}" "origin/${BASE_REF}"
          git show-ref --verify "refs/heads/${BASE_REF}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Kernel version alignment
        shell: bash
        run: |
          set -euo pipefail
          runtime_version="$(go list -m -f '{{.Version}}' github.com/aisphereio/kernel)"
          test "$runtime_version" = "$KERNEL_VERSION" || {
            echo "Kernel runtime is $runtime_version, expected $KERNEL_VERSION"
            exit 1
          }

      - name: Install pinned generators
        shell: bash
        run: make KERNEL_VERSION="${KERNEL_VERSION}" tools

      - name: Check protobuf compatibility and OpenAPI contract
        run: make KERNEL_VERSION=${KERNEL_VERSION} BASE_REF=${{ github.base_ref || 'main' }} contract-check

      - name: Test
        run: go test ./... -count=1 -short

      - name: Build
        run: go build ./...

      - name: Render Kubernetes manifests
        run: kubectl kustomize deploy/k8s/base > /tmp/aisphere-hub-k8s.yaml

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-hub:${{ github.sha }} .
