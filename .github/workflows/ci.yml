name: CI

on:
  pull_request:
    branches:
      - main
      - 'feat/**'
  push:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: write

concurrency:
  group: hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply one-shot Skill share hardening
        if: ${{ github.event_name == 'pull_request' && hashFiles('.github/scripts/harden_skill_share_roles.py') != '' }}
        run: |
          python3 .github/scripts/harden_skill_share_roles.py
          gofmt -w internal/biz/skill.go internal/biz/skill_access_policy.go internal/biz/skill_access_policy_test.go
          rm -f .github/scripts/harden_skill_share_roles.py
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./... -count=1 -short

      - name: Build
        run: go build ./...

      - name: Render Kubernetes manifests
        run: kubectl kustomize deploy/k8s/base > /tmp/aisphere-hub-k8s.yaml

      - name: Build container image
        run: docker build --build-arg VERSION=${{ github.sha }} -t aisphere-hub:${{ github.sha }} .

      - name: Commit one-shot implementation
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --stat
          git commit -m "fix: harden Skill share role replacement"
          git push origin HEAD:${{ github.head_ref }}
