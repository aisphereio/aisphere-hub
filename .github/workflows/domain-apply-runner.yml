name: Domain refactor validator

on:
  pull_request:
    branches:
      - feat/shared-postgres-git-engine

permissions:
  contents: write

concurrency:
  group: domain-refactor-validator-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-commit:
    if: github.head_ref == 'feat/repository-backed-skill-profiles'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Merge latest foundation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin feat/shared-postgres-git-engine
          git merge --no-edit origin/feat/shared-postgres-git-engine

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply repository-backed Skill changes
        run: |
          base64 -d .github/domain-remaining.patch.gz.b64 | gzip -d > /tmp/domain.patch
          git apply --index /tmp/domain.patch
          git apply --index .github/domain-fix.patch
          gofmt -w \
            internal/biz/skill_test.go \
            internal/data/authz_bootstrap.go \
            internal/data/migration_contract_test.go \
            internal/data/skill.go \
            internal/data/skill_test.go \
            internal/gitengine/engine.go \
            internal/gitengine/engine_test.go \
            internal/server/skillset_http.go
          git add -A

      - name: Test
        id: test
        continue-on-error: true
        run: go test ./... -count=1 -short > /tmp/domain-test.log 2>&1

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-validator-log
          path: /tmp/domain-test.log

      - name: Commit validated refactor
        if: steps.test.outcome == 'success'
        run: |
          git rm \
            .github/domain-remaining.patch.gz.b64 \
            .github/domain-fix.patch \
            .github/workflows/apply-domain-patch.yml \
            .github/workflows/domain-apply-runner.yml
          git commit -m "refactor(skill): persist repository-backed profiles"
          git push origin HEAD:${{ github.head_ref }}

      - name: Report failure
        if: steps.test.outcome == 'failure'
        run: |
          cat /tmp/domain-test.log
          exit 1
