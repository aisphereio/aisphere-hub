name: Apply domain patch

on:
  push:
    branches:
      - feat/repository-backed-skill-profiles
  pull_request:
    branches:
      - feat/shared-postgres-git-engine

permissions:
  contents: write

concurrency:
  group: apply-domain-patch
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/repository-backed-skill-profiles

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply repository-backed Skill patch
        run: |
          base64 -d .github/domain-remaining.patch.gz.b64 | gzip -d > /tmp/domain.patch
          git apply --index /tmp/domain.patch
          git apply --index .github/domain-fix.patch
          gofmt -w \
            internal/biz/skill_test.go \
            internal/data/authz_bootstrap.go \
            internal/data/migration_contract_test.go \
            internal/data/skill.go \
            internal/data/skill_test.go \
            internal/gitengine/engine.go \
            internal/gitengine/engine_test.go \
            internal/server/skillset_http.go
          git add -A

      - name: Test
        id: test
        continue-on-error: true
        run: go test ./... -count=1 -short > /tmp/domain-test.log 2>&1

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-test-log
          path: /tmp/domain-test.log

      - name: Commit validated domain refactor
        if: steps.test.outcome == 'success'
        run: |
          git rm .github/domain-remaining.patch.gz.b64 .github/domain-fix.patch .github/workflows/apply-domain-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "refactor(skill): persist repository-backed profiles"
          git push origin HEAD:feat/repository-backed-skill-profiles

      - name: Report failure
        if: steps.test.outcome == 'failure'
        run: |
          cat /tmp/domain-test.log
          exit 1
