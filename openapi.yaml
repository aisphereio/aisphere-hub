                    type: string
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/aisphere.hub.skill.v1.ListSkillVersionFilesResponse'
    /v1/skills/{name}/versions/{version}:offline:
        post:
            tags:
                - SkillService
            description: OfflineSkillVersion removes one online version from catalog/runtime use.
            operationId: SkillService_OfflineSkillVersion
            parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersionActionRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersion'
    /v1/skills/{name}/versions/{version}:online:
        post:
            tags:
                - SkillService
            description: |-
                OnlineSkillVersion makes one published version consumable by
                 catalog/runtime. Any previously-online version of the same skill is
                 automatically demoted to published.
            operationId: SkillService_OnlineSkillVersion
            parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersionActionRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersion'
    /v1/skills/{name}/versions/{version}:publish:
        post:
            tags:
                - SkillService
            description: PublishSkillVersion marks a submitted version as published.
            operationId: SkillService_PublishSkillVersion
            parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersionActionRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersion'
    /v1/skills/{name}/versions/{version}:submit:
        post:
            tags:
                - SkillService
            description: SubmitSkillVersion marks a draft version ready for publish.
            operationId: SkillService_SubmitSkillVersion
            parameters:
                - name: name
                  in: path
                  required: true
                  schema:
                    type: string
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersionActionRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersion'
    /v1/skills:upload:
        post:
            tags:
                - SkillService
            description: |-
                UploadSkillPackage imports a zipped Skill package into a new or
                 existing version. The zip must contain SKILL.md with YAML front-matter
                 declaring name, description, version. Other files become version
                 files; binary files are base64-encoded in the DB content column.
            operationId: SkillService_UploadSkillPackage
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/aisphere.hub.skill.v1.UploadSkillPackageRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/aisphere.hub.skill.v1.SkillVersion'
components:
    schemas:
        aisphere.hub.audit.v1.AuditActor:
            type: object
            properties:
                subjectId:
                    type: string
                subjectType:
                    type: string
                tenantId:
                    type: string
                orgId:
                    type: string
                projectId:
                    type: string
