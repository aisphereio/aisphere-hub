            description: AuditRecord is one security audit event. Mirrors kernel auditx.Record.
        aisphere.hub.audit.v1.AuditResource:
            type: object
            properties:
                type:
                    type: string
                id:
                    type: string
                tenantId:
                    type: string
                orgId:
                    type: string
                projectId:
                    type: string
        aisphere.hub.audit.v1.QueryAuditRecordsResponse:
            type: object
            properties:
                records:
                    type: array
                    items:
                        $ref: '#/components/schemas/aisphere.hub.audit.v1.AuditRecord'
                total:
                    type: integer
                    format: int32
        aisphere.hub.authn.v1.ExchangeRequest:
            required:
                - code
                - redirectUri
            type: object
            properties:
                code:
                    type: string
                redirectUri:
                    type: string
                state:
                    type: string
                codeVerifier:
                    type: string
                    description: "code_verifier is the PKCE code verifier. Required when the authorization\r\n request was made with a code_challenge; recommended for all public\r\n clients (SPAs, mobile apps) that cannot store a client secret.\r\n Maps to kernel authn.AuthCodeExchangeRequest.CodeVerifier.\r\n\r\n NOTE: see Exchange RPC comment — the current Casdoor adapter does not\r\n yet forward this to the SDK. The field is accepted on the wire for\r\n forward compatibility."
                orgId:
                    type: string
                appId:
                    type: string
        aisphere.hub.authn.v1.IntrospectRequest:
            required:
                - token
            type: object
            properties:
                token:
                    type: string
                    description: token is the token to validate and inspect.
                tokenType:
                    type: string
                    description: "token_type hints which kind of token is being introspected. Accepted\r\n values: \"access_token\" (default), \"refresh_token\", \"id_token\".\r\n Maps to kernel authn.VerifyTokenRequest.TokenType."
                issuer:
                    type: string
                    description: "issuer optionally restricts the accepted token issuer. When unset, the\r\n globally configured IdP issuer is used."
                audience:
                    type: array
                    items:
                        type: string
                    description: "audience optionally restricts the accepted token audience. When unset,\r\n the audience check is skipped."
                orgId:
                    type: string
                appId:
                    type: string
        aisphere.hub.authn.v1.IntrospectResponse:
            type: object
            properties:
                active:
                    type: boolean
                    description: "active indicates whether the token is currently valid (not expired, not\r\n revoked, signature OK, issuer/audience match if specified)."
                principal:
                    $ref: '#/components/schemas/aisphere.hub.authn.v1.Principal'
                scope:
                    type: string
                    description: scope is the space-delimited scope list attached to the token.
                expiresAt:
                    type: string
                    description: expires_at is the token's expiration time. Zero value means unknown.
                    format: date-time
                issuedAt:
                    type: string
                    description: issued_at is the token's issue time. Zero value means unknown.
                    format: date-time
            description: IntrospectResponse mirrors RFC 7662 token introspection.
        aisphere.hub.authn.v1.LoginURLResponse:
            type: object
            properties:
                loginUrl:
                    type: string
        aisphere.hub.authn.v1.LogoutURLResponse:
            type: object
            properties:
                logoutUrl:
                    type: string
        aisphere.hub.authn.v1.MeResponse:
            type: object
            properties:
                principal:
                    $ref: '#/components/schemas/aisphere.hub.authn.v1.Principal'
        aisphere.hub.authn.v1.Principal:
            type: object
            properties:
                subjectType:
                    type: string
                subjectId:
                    type: string
                username:
                    type: string
                name:
                    type: string
                displayName:
                    type: string
                email:
                    type: string
                avatar:
                    type: string
                orgId:
                    type: string
                projectId:
                    type: string
                roles:
                    type: array
                    items:
                        type: string
                groups:
                    type: array
                    items:
                        type: string
                isAuthenticated:
                    type: boolean
                phone:
                    type: string
                    description: "phone is the user's phone number when available from the IdP.\r\n Maps to kernel authn.Principal.Phone."
                scopes:
                    type: array
                    items:
                        type: string
                    description: "scopes are the OAuth/OIDC scopes attached to the current access token.\r\n Frontends can use this to gate UI affordances (e.g. hide \"write\"\r\n buttons when the token lacks the write scope).\r\n Maps to kernel authn.Principal.Scopes."
                authMethod:
                    type: string
                    description: "auth_method records how the subject authenticated. Common values match\r\n the kernel authn.AuthMethod* constants: \"oauth\", \"oidc\", \"jwt\",\r\n \"api_key\", \"mtls\", \"session\", \"dev_token\", \"none\".\r\n Maps to kernel authn.Principal.AuthMethod."
                expiresAt:
                    type: string
                    description: "expires_at is when the current access token expires. Frontends should\r\n use this to schedule proactive token refreshes before the token\r\n expires, rather than waiting for a 401 to trigger a reactive refresh.\r\n Zero value means the expiry is unknown (e.g. the IdP did not return\r\n an exp claim).\r\n Maps to kernel authn.Principal.ExpiresAt."
                    format: date-time
                attributes:
                    type: object
                    description: "attributes carries provider-specific claims (e.g. Casdoor owner/name,\r\n external ID, signin method, custom fields) that are not part of the\r\n canonical Principal schema. Values must be JSON-serializable.\r\n Maps to kernel authn.Principal.Attributes.\r\n\r\n NOTE: some attributes (such as `access_token`) are sensitive and\r\n SHOULD be filtered out by the service layer before returning to\r\n frontend clients. See kernel/authn/casdoor/token.go:principalFromClaims\r\n for the list of attributes currently set by the Casdoor adapter."
            description: "Principal is the normalized identity of the current caller.\r\n\r\n Field set is aligned with kernel authn.Principal (github.com/aisphereio/\r\n kernel/authn.Principal). The kernel type has additional internal fields\r\n (Provider, ExternalID, Issuer, Audience, TenantID, AppID, IssuedAt) that\r\n are not exposed here because they are not useful to typical frontend\r\n consumers; if a future use case needs them, add fields rather than\r\n exposing the kernel struct verbatim."
        aisphere.hub.authn.v1.RefreshRequest:
            required:
                - refreshToken
            type: object
            properties:
                refreshToken:
                    type: string
                scope:
                    type: string
                orgId:
                    type: string
                appId:
                    type: string
        aisphere.hub.authn.v1.RevokeRequest:
            required:
                - token
            type: object
            properties:
                token:
                    type: string
                    description: token is the access, refresh, or id token to revoke.
                tokenType:
                    type: string
                    description: "token_type hints which kind of token is being revoked. Accepted values:\r\n   \"access_token\"  (default)\r\n   \"refresh_token\"\r\n   \"id_token\"\r\n Maps to kernel authn.RevokeTokenRequest.TokenType."
                orgId:
                    type: string
                appId:
                    type: string
            description: RevokeRequest asks the implementation to revoke a single token.
        aisphere.hub.authn.v1.RevokeResponse:
            type: object
            properties:
                revoked:
                    type: boolean
                    description: "revoked is true when the token was successfully revoked (either IdP-side\r\n or local blacklist)."
                idpRevoked:
                    type: boolean
                    description: "idp_revoked is true when the IdP itself confirmed revocation. False\r\n means only the local session blacklist was updated; the token may still\r\n be valid against other Resource Servers until it expires."
                message:
                    type: string
                    description: "message carries a human-readable note, e.g. \"casdoor sdk does not expose\r\n token revocation; only local blacklist updated\"."
            description: "RevokeResponse returns the outcome of a Revoke call.\r\n\r\n We do not use google.protobuf.Empty so callers can distinguish\r\n \"IdP-side revoked\" from \"only local blacklist updated\" — important for\r\n security-sensitive flows where the caller needs to know whether the token\r\n may still be valid against other Resource Servers."
        aisphere.hub.authn.v1.TokenResponse:
            type: object
            properties:
                accessToken:
                    type: string
                refreshToken:
                    type: string
                idToken:
                    type: string
                tokenType:
                    type: string
                expiresIn:
                    type: string
                scope:
                    type: string
            description: "TokenResponse is the OAuth2/OIDC token set returned by Exchange and Refresh.\r\n\r\n `expires_in` is seconds from issue time to expiry (OAuth2 standard). For a\r\n wall-clock expiry, callers can compute issued_at + expires_in, or use the\r\n `expires_at` field on Principal returned by Me/Introspect."
        aisphere.hub.authz.v1.BatchCheckPermissionsRequest:
            required:
                - checks
            type: object
            properties:
                checks:
                    type: array
                    items:
                        $ref: '#/components/schemas/aisphere.hub.authz.v1.CheckPermissionRequest'
                fullyConsistent:
                    type: boolean
                consistencyToken:
                    type: string
        aisphere.hub.authz.v1.BatchCheckPermissionsResponse:
            type: object
            properties:
                decisions:
                    type: array
                    items:
                        $ref: '#/components/schemas/aisphere.hub.authz.v1.CheckPermissionResponse'
                consistencyToken:
                    type: string
        aisphere.hub.authz.v1.CheckPermissionRequest:
            required:
                - subject
                - resource
                - permission
            type: object
            properties:
                subject:
                    $ref: '#/components/schemas/aisphere.hub.authz.v1.SubjectRef'
                resource:
                    $ref: '#/components/schemas/aisphere.hub.authz.v1.ObjectRef'
                permission:
                    type: string
                tenantId:
                    type: string
                orgId:
                    type: string
                projectId:
                    type: string
                subjectAttrs:
                    type: object
                    description: |-
                        Subject / resource / environment attrs are passed to SpiceDB as
                         caveat context (ABAC). Optional; omit for pure ReBAC checks.
                resourceAttrs:
                    type: object
                environmentAttrs:
                    type: object
                fullyConsistent:
                    type: boolean
                    description: |-
                        fully_consistent=true forces SpiceDB to use the latest writes
                         (slowest). When false, uses at-least-as-fresh with the optional
                         consistency_token. Default false.
                consistencyToken:
                    type: string
        aisphere.hub.authz.v1.CheckPermissionResponse:
            type: object
