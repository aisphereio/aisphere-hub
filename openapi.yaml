                effect:
                    type: string
                    description: |-
                        effect is the canonical decision: "allow", "deny", "no_match".
                         "no_match" means SpiceDB had no matching relationship / permission
                         definition; callers usually treat it the same as "deny" but may
                         surface a different message.
                allowed:
                    type: boolean
                reason:
                    type: string
                consistencyToken:
                    type: string
                missingContext:
                    type: array
                    items:
                        type: string
        aisphere.hub.authz.v1.DeleteRelationshipsResponse:
            type: object
            properties:
                consistencyToken:
                    type: string
