                id:
                    type: string
                time:
                    type: string
                    format: date-time
                action:
                    type: string
                result:
                    type: string
                severity:
                    type: string
                reason:
                    type: string
                actor:
                    $ref: '#/components/schemas/aisphere.hub.audit.v1.AuditActor'
                resource:
                    $ref: '#/components/schemas/aisphere.hub.audit.v1.AuditResource'
                requestId:
                    type: string
                traceId:
                    type: string
                clientIp:
                    type: string
                userAgent:
