tags:
    - name: AuditService
      description: |-
        AuditService exposes a read-only audit log query API.

         Audit records are written by business modules (skill.create /
         skill.delete / skill.share.* etc.) via auditx.Recorder. This service
         lets frontend "activity feed" UIs query those records by actor,
         resource, action, time range, etc.

         ## Authorization

         Querying audit records requires no special permission today — any
         authenticated user can query any record. This is acceptable for dev
         and small-team deployments. For multi-tenant production, gate this
         RPC behind an "audit.read" permission via authz, OR filter results
         by the caller's org / project so users only see their own org's
         audit trail.
    - name: AuthnService
      description: "AuthnService is the authentication facade for aisphere-hub.\r\n\r\n Hub does not issue or persist local access tokens. Browser login, OAuth code\r\n exchange, refresh, logout, token revocation and token introspection are\r\n delegated to the configured identity provider (Casdoor by default through\r\n aisphere-kit/kernel authn). API requests are authenticated by kit middleware\r\n using IdP access tokens.\r\n\r\n ## Browser-friendly 302 routes (MUST be registered by the implementation)\r\n\r\n In addition to the JSON RPCs declared below, implementations MUST register\r\n two browser-friendly HTTP routes that return a 302 redirect instead of a\r\n JSON body. These exist because copying a JSON-encoded URL out of a response\r\n body unescapes `&` into `\\u0026` in many browsers and terminals, which\r\n breaks the redirect URL.\r\n\r\n   GET /v1/authn/login     -> 302 to the IdP login URL\r\n   GET /v1/authn/logout    -> 302 to the IdP logout URL\r\n\r\n They mirror the JSON `LoginURL` and `LogoutURL` RPCs but accept query\r\n parameters (redirect_uri, state, scope, prompt, post_logout_redirect_uri,\r\n id_token_hint) and perform the redirect server-side. They MUST be registered\r\n manually in the service layer via srv.HandleFunc, since google.api.http\r\n cannot express a 302 response. See the legacy backend\r\n `internal/service/auth.go` for the registration pattern.\r\n\r\n ## Multi-tenancy\r\n\r\n All requests carry optional `org_id` and `app_id` fields. When unset, the\r\n implementation falls back to the globally configured Casdoor organization\r\n and application. Per-request values allow multi-tenant deployments to\r\n target a specific org/app without restarting the service. This matches the\r\n kernel authn contracts (LoginURLRequest, AuthCodeExchangeRequest,\r\n RefreshTokenRequest, VerifyTokenRequest, RevokeTokenRequest all carry\r\n OrgID/AppID).\r\n\r\n ## Migration from legacy /v3/auth/*\r\n\r\n This service replaces the legacy `api.auth.v1.AuthService` at /v3/auth/*.\r\n Path is intentionally version-bumped to v1/authn to signal the contract\r\n change (Principal no longer duplicated on MeResponse top-level, new RPCs\r\n added). Deployments that need to keep legacy clients working should mount a\r\n gateway-level path rewrite /v3/auth/* -> /v1/authn/* for a transition\r\n period; the request/response bodies are wire-compatible except for the\r\n removed flat fields on MeResponse."
    - name: AuthzService
      description: |-
        AuthzService exposes a provider-neutral authorization API backed by
         SpiceDB (Zanzibar-style ReBAC) with optional ABAC caveats.

         ## Resource model

           Permission check:   subject  -[permission]->  resource
           Relationship tuple: resource -[relation]->   subject

         A "permission" is a derived, transitive capability (e.g. "read",
         "delete"). A "relation" is a direct edge (e.g. "owner", "viewer",
         "editor"). Permissions are defined in the SpiceDB schema as a union
         of relations; callers cannot write permissions, only relations.

         ## Common usage

         ### Skill ownership (auto-written on skill create)

           WriteRelationships({
             resource: {type: "skill", id: "my-skill"},
             relation: "owner",
             subject:  {type: "user", id: "u_123"}
           })

         ### Skill share (grant viewer access)

           WriteRelationships({
             resource: {type: "skill", id: "my-skill"},
             relation: "viewer",
             subject:  {type: "user", id: "u_456"}
           })

         ### Check before reading a skill

           CheckPermission({
             subject:    {type: "user", id: "u_456"},
             resource:   {type: "skill", id: "my-skill"},
             permission: "read"
           }) → {allowed: true, effect: "allow"}

         ### List all skills a user can read

           LookupResources({
             subject:      {type: "user", id: "u_456"},
             resource_type: "skill",
             permission:   "read"
           }) → {resources: [{type:"skill", id:"my-skill"}, ...]}

         ## ABAC caveats (advanced)

         For dynamic attributes (e.g. "viewer only during business hours"), pass
         a `caveat_name` and `caveat_context` on WriteRelationships, or pass
         `subject_attrs` / `resource_attrs` / `environment_attrs` on
         CheckPermission. SpiceDB evaluates the caveat against the context at
         check time.

         ## Consistency

         SpiceDB supports three consistency modes. Pass `fully_consistent=true`
         for admin / debug calls (slowest but always sees latest writes). For
         hot paths, pass the `consistency_token` returned by the previous
         write/check to get at-least-as-fresh semantics without paying full
         consistency cost.
    - name: SkillService
      description: |-
        SkillService exposes the canonical AIHub Skill API.

         This is the first real business module migrated from the legacy backend
         into the new kernel-based Hub. It manages canonical Skills and their
         versioned packages.

         ## Resource model

           Skill           /v1/skills/{name}
           SkillVersion    /v1/skills/{name}/versions/{version}
           SkillFile       /v1/skills/{name}/versions/{version}/files/{path}

         Skill names match `^[A-Za-z0-9][A-Za-z0-9_.-]{0,127}$` and are globally
         unique. Version strings are arbitrary but should follow semver when
         possible (`0.1.0`, `1.0.0-rc.1`).

         ## Authz

         All RPCs require a Bearer token (kernel authn middleware enforces this).
         Per-skill authorization (owner / shared / public visibility) is enforced
         in the biz layer via accessx.Guard. Public-skill read fallback lets any
         authenticated user read skills with visibility=public.

         ## Status machine (SkillVersion)

           draft → submitted → published → online → offline
                                               ↑________|

         Each transition is an idempotent CAS (compare-and-set on the status
         column) so concurrent transition calls on the same version cannot both
         succeed.
