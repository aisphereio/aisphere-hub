# Handwritten HTTPRoute for the SkillSet REST API.
#
# SkillSet is a lightweight PostgreSQL-only Hub resource served by handwritten
# HTTP handlers (internal/server/skillset_http.go), so it is not covered by
# protoc-gen-go-deploy. Without this route, /v1/skillsets does not get the
# X-Aisphere-Route-Authn-Mode: verify_jwt signal and the gateway does not
# forward the OIDC access token as a Bearer credential; the backend then runs
# in casdoor_jwt mode with no Authorization header, falls back to anonymous,
# and skillset_security.go rejects POST /v1/skillsets with UNAUTHENTICATED.
#
# This route mirrors the generated skill-service-authenticated.yaml contract so
# the same OIDC SecurityPolicy (hub-oidc-policy / aisphere-hub-http-security)
# attaches and forwards the verified Casdoor access token to the hub backend.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: skillset-service-authenticated
  namespace: "aisphere"
  labels:
    app.kubernetes.io/name: "aisphere-hub"
    app.kubernetes.io/component: "gateway-route"
    aisphere.io/exposure-bucket: "authenticated"
spec:
  parentRefs:
    - name: "aisphere-gateway"
      namespace: "aisphere"
  rules:
    # POST /v1/skillsets — create skillset (requires zone membership).
    - matches:
        - method: "POST"
          path:
            type: PathPrefix
            value: "/v1/skillsets"
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Aisphere-Upstream-Operation
                value: "aisphere.hub.skillset.v1.CreateSkillSet"
              - name: X-Aisphere-Route-Exposure
                value: "AUTHENTICATED"
              - name: X-Aisphere-Route-Authn-Mode
                value: "verify_jwt"
              - name: X-Aisphere-Authz-Action
                value: "write"
              - name: X-Aisphere-Authz-Resource
                value: "zone:{org_id}"
      backendRefs:
        - name: "aisphere-hub"
          namespace: "aisphere"
          port: 18001
    # GET /v1/skillsets — list skillsets.
    - matches:
        - method: "GET"
          path:
            type: PathPrefix
            value: "/v1/skillsets"
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Aisphere-Upstream-Operation
                value: "aisphere.hub.skillset.v1.ListSkillSets"
              - name: X-Aisphere-Route-Exposure
                value: "AUTHENTICATED"
              - name: X-Aisphere-Route-Authn-Mode
                value: "verify_jwt"
              - name: X-Aisphere-Authz-Action
                value: "view"
              - name: X-Aisphere-Authz-Resource
                value: "skillset:*"
      backendRefs:
        - name: "aisphere-hub"
          namespace: "aisphere"
          port: 18001
    # GET/PUT/DELETE /v1/skillsets/{name} — item operations.
    - matches:
        - method: "GET"
          path:
            type: PathPrefix
            value: "/v1/skillsets/"
        - method: "PUT"
          path:
            type: PathPrefix
            value: "/v1/skillsets/"
        - method: "DELETE"
          path:
            type: PathPrefix
            value: "/v1/skillsets/"
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Aisphere-Upstream-Operation
                value: "aisphere.hub.skillset.v1.SkillSetItem"
              - name: X-Aisphere-Route-Exposure
                value: "AUTHENTICATED"
              - name: X-Aisphere-Route-Authn-Mode
                value: "verify_jwt"
              - name: X-Aisphere-Authz-Action
                value: "write"
              - name: X-Aisphere-Authz-Resource
                value: "skillset:{name}"
      backendRefs:
        - name: "aisphere-hub"
          namespace: "aisphere"
          port: 18001
    # POST/DELETE /v1/skillsets/{name}/members[/{skill}] — member binding.
    - matches:
        - method: "POST"
          path:
            type: PathPrefix
            value: "/v1/skillsets/"
        - method: "DELETE"
          path:
            type: PathPrefix
            value: "/v1/skillsets/"
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Aisphere-Upstream-Operation
                value: "aisphere.hub.skillset.v1.SkillSetMember"
              - name: X-Aisphere-Route-Exposure
                value: "AUTHENTICATED"
              - name: X-Aisphere-Route-Authn-Mode
                value: "verify_jwt"
              - name: X-Aisphere-Authz-Action
                value: "write"
              - name: X-Aisphere-Authz-Resource
                value: "skillset:{name}"
      backendRefs:
        - name: "aisphere-hub"
          namespace: "aisphere"
          port: 18001
