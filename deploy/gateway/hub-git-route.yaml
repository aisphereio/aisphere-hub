# Hub Git HTTPRoute — serves the native git smart-HTTP protocol (clone/fetch/
# push/LFS) over a dedicated route that uses JWT Bearer authentication only.
#
# Git CLI clients cannot complete a browser OIDC redirect flow (302 + HTML
# login page), so /git must NOT carry the OIDC SecurityPolicy attached to
# hub-api-protected-route. Instead it carries its own JWT-only policy
# (hub-git-security-policy.yaml) so that:
#   - missing/expired token  -> 401 + WWW-Authenticate: Bearer (Git then calls
#     the credential helper, git-credential-aisphere)
#   - valid token, no skill permission -> 403 (handled by Hub access middleware)
#   - IAM/SpiceDB unavailable -> 503 (handled by Hub errorx mapping)
#
# The route targets the same Hub backend (aisphere-hub:18001) as the protected
# API route; Hub runs in gateway_trusted mode and reconstructs the Principal
# from the x-aisphere-external-* headers injected by Envoy's claimToHeaders.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hub-git-route
  namespace: aisphere
  labels:
    app.kubernetes.io/name: aisphere-hub
    app.kubernetes.io/component: gateway-route
    aisphere.io/exposure-bucket: git-cli
spec:
  parentRefs:
    - name: aisphere-gateway
      namespace: aisphere
      sectionName: https
  hostnames:
    - "api.weagent.cc"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /git
      backendRefs:
        - name: aisphere-hub
          namespace: aisphere
          port: 18001
