# Hub SecurityPolicy — OIDC authentication + JWT verification for the hub API.
#
# Targets the aggregate HTTPRoute `hub-http` (see hub-http-route.yaml), which
# fronts all Hub /v1 endpoints. Envoy Gateway:
#   1. Terminates OIDC at the gateway layer (redirects unauthenticated browser
#      requests to Casdoor login).
#   2. Verifies the JWT access token against Casdoor's JWKS endpoint.
#   3. Injects x-aisphere-external-* headers with user claims for the backend.
#
# The hub runs in gateway_trusted mode, trusting these injected headers
# without re-verifying the JWT on every request.
#
# Casdoor application: aisphere (client_id: bbdcfc272e2b990cb923)
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: hub-oidc
  namespace: aisphere
  labels:
    app.kubernetes.io/name: aisphere-hub
    app.kubernetes.io/component: gateway-security
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hub-http
  oidc:
    provider:
      issuer: "https://casdoor.weagent.cc:30723"
    clientID: "bbdcfc272e2b990cb923"
    clientSecret:
      name: casdoor-hub-client-secret
    redirectURL: "https://api.weagent.cc:30723/v1/authn/exchange"
    logoutPath: "/v1/authn/logout"
    scopes:
      - openid
      - profile
      - email
    refreshToken: true
    forwardAccessToken: true
    passThroughAuthHeader: true
  jwt:
    providers:
      - name: casdoor
        issuer: "https://casdoor.weagent.cc:30723"
        audiences:
          - "bbdcfc272e2b990cb923"
        remoteJWKS:
          uri: "https://casdoor.weagent.cc:30723/.well-known/jwks"
        extractFrom:
          headers:
            - name: Authorization
              valuePrefix: "Bearer "
        claimToHeaders:
          - claim: sub
            header: x-aisphere-external-sub
          - claim: email
            header: x-aisphere-external-email
          - claim: name
            header: x-aisphere-external-name
          - claim: preferred_username
            header: x-aisphere-external-username
