# Casdoor Hub OIDC Client Secret
#
# This secret is referenced by hub-security-policy.yaml for the OIDC flow.
# Create it with:
#
#   kubectl create secret generic casdoor-hub-client-secret \
#     --namespace aisphere \
#     --from-literal=client-secret=c4d351406d40251b267624328e50e8a1f7352a65
#
# Or apply this file directly (base64-encoded value):
#   echo -n "c4d351406d40251b267624328e50e8a1f7352a65" | base64 -w0
#   → YzRkMzUxNDA2ZDQwMjUxYjI2NzYyNDMyOGU1MGU4YTFmNzM1MmE2NQ==
#
# NOTE: This file is for reference only. In production, use kubectl create secret
# or a sealed secret controller. Do NOT commit raw secrets to git.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: casdoor-hub-client-secret
#   namespace: aisphere
# type: Opaque
# data:
#   client-secret: <base64-of-client-secret>