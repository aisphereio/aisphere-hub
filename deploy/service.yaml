apiVersion: v1
kind: Service
metadata:
  name: aisphere-hub
  namespace: aisphere
  labels:
    app: aisphere-hub
    service: hub
spec:
  type: ClusterIP
  selector:
    app: aisphere-hub
  ports:
    - name: http
      port: 18001
      targetPort: 18001
    - name: grpc
      port: 19001
      targetPort: 19001