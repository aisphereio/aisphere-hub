# 方式一：直接用 Sandbox（核心，需指定镜像）
# 验证最小可用：稳定 hostname + 命令执行
apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: hello-world
  namespace: agent-sandbox-demo
spec:
  podTemplate:
    spec:
      containers:
      - name: my-container
        image: busybox:latest
        command: ["sh", "-c", "sleep 3600"]
      restartPolicy: Never
