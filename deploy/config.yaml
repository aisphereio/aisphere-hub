service:
  name: aisphere-hub
  version: dev
  env: production

server:
  http:
    addr: 0.0.0.0:18001
    timeout_ns: 5000000000
    cors:
      enabled: true
      allowed_origins:
        - "http://localhost:3000"
        - "http://127.0.0.1:3000"
        - "http://localhost:3001"
        - "http://127.0.0.1:3001"
        - "https://hub.weagent.cc:30723"
        - "https://api.weagent.cc:30723"
      allowed_methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-Trace-ID
        - Traceparent
        - Tracestate
      allow_credentials: true
      max_age_ns: 3600000000000
  grpc:
    addr: 0.0.0.0:19001
    timeout_ns: 5000000000

log:
  service_name: aisphere-hub
  env: production
  version: dev
  level: info
  format: json
  output: stdout
  add_source: true
  redact:
    enabled: true
    keys:
      - password
      - secret
      - token
      - access_key
      - secret_key
      - client_secret
    value: "***"
  access_log:
    enabled: true
    skip_paths:
      - /healthz
      - /readyz
      - /metrics
    slow_threshold: 1000000000
    request_id_header: X-Request-ID
    route_header: X-Route-Pattern
    log_user_agent: true

data:
  database:
    enabled: true
    config:
      auto_create_database: true
      driver: postgres
      dsn: "postgres://postgres:ChangeMe_PostgreSQL_123@apps-postgre.aisphere:5432/aisphere_hub?sslmode=disable"
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime_ns: 1800000000000
      conn_max_idle_time_ns: 300000000000
      query_timeout_ns: 5000000000
      slow_query_threshold_ns: 200000000
      audit_enabled: true
      metrics_enabled: true
    migration:
      enabled: true
      engine: goose
      dir: ./migrations/postgres
      table: aihub_schema_migrations
      mode: apply
      fail_on_pending: true
      allow_concurrent: true
  cache:
    enabled: true
    config:
      driver: redis
      addrs:
        - "redis-standalone.aisphere:6379"
      username: ""
      password: "Redis@Passw0rd"
      db: 0
      key_prefix: aisphere-hub
      dial_timeout_ns: 5000000000
      read_timeout_ns: 3000000000
      write_timeout_ns: 3000000000
      metrics_enabled: true
  object_store:
    enabled: true
    config:
      driver: minio
      endpoint: "minio.aisphere:9000"
      use_ssl: false
      access_key: "minioadmin"
      secret_key: "minioadmin@123"
      bucket: aisphere-hub
      ensure_bucket: true
      presign_expiry_ns: 900000000000
      metrics_enabled: true

security:
  authn:
    enabled: true
    provider: casdoor
    mode: gateway_trusted
    cache_ttl_ns: 300000000000
    oidc:
      provider: casdoor
      issuer: http://casdoor.aisphere:8000
      discovery_url: http://casdoor.aisphere:8000/.well-known/openid-configuration
      jwks_url: http://casdoor.aisphere:8000/.well-known/jwks
      audience: [bbdcfc272e2b990cb923]
      allowed_owners: [aisphere]
      allowed_algs: [RS256, RS512, ES256, ES512]
      jwks_cache_ttl_ns: 600000000000
      clock_skew_ns: 60000000000
    casdoor:
      endpoint: "http://casdoor.aisphere:8000"
      organization_name: aisphere
      application_name: aisphere
      client_id: "bbdcfc272e2b990cb923"
      client_secret: "c4d351406d40251b267624328e50e8a1f7352a65"
      jwt_certificate_file: configs/casdoor.pub
      timeout: 10000000000
      metrics_enabled: true
  internal_call:
    enabled: true
    header: X-Aisphere-Internal-Token
    token: "aisphere-internal-token-2026"
  access:
    public_operations:
      - /healthz
      - /readyz
      - /internal/dtm/*
      - /v1/authn/login*
      - /v1/authn/logout*
      - /v1/authn/exchange
      - /v1/authn/refresh
      - /v1/authn/revoke
      - /v1/authn/introspect
      - /aisphere.hub.authn.v1.AuthnService/LoginURL
      - /aisphere.hub.authn.v1.AuthnService/Exchange
      - /aisphere.hub.authn.v1.AuthnService/Refresh
      - /aisphere.hub.authn.v1.AuthnService/LogoutURL
      - /aisphere.hub.authn.v1.AuthnService/Revoke
      - /aisphere.hub.authn.v1.AuthnService/Introspect
      - /grpc.health.v1.Health/*
    skip_operations: []
  authz:
    enabled: true
    provider: iam_grpc
    dev_allow_all: false
    iam_grpc:
      endpoint: "aisphere-iam.aisphere.svc.cluster.local:19080"
      caller_service: aisphere-hub
      insecure: true
      timeout: 5000000000
      retry_max: 3
      metrics_enabled: true

gateway:
  route_registry:
    provider: etcd
    prefix: /aisphere/kernel/routes/dev
    endpoints: ["etcd-client.aisphere:2379"]
    dial_timeout_ns: 5000000000
    request_timeout_ns: 5000000000

audit:
  enabled: true
  store: memory

metrics:
  enabled: true
  addr: "127.0.0.1:19090"
  path: "/metrics"
  pprof: false

dtm:
  enabled: true
  driver: dtm
  protocol: http
  server: "http://36.138.61.152:30897/api/dtmsvr"
  service_base_url: "http://aisphere-hub.aisphere:18001"
  branch_prefix: "/internal/dtm"
  branch_secret: "aisphere-dtm-branch-secret-2026"
  wait_result: true
  timeout_ns: 10000000000
  request_timeout: 10
  retry_interval: 5
  timeout_to_fail: 60
  metrics_enabled: true

skill:
  storage:
    max_versions: 5