apiVersion: apps/v1
kind: Deployment
metadata:
  name: aisphere-hub
  namespace: aisphere
  labels:
    app.kubernetes.io/name: aisphere-hub
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aisphere-hub
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aisphere-hub
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: aisphere-hub
      imagePullSecrets:
        - name: aliyun-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 100
        fsGroup: 100
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: config
          configMap:
            name: aisphere-hub-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp
          emptyDir: {}
        - name: git-data
          persistentVolumeClaim:
            claimName: aisphere-hub-git
      containers:
        - name: backend
          image: registry.cn-beijing.aliyuncs.com/ainfracn/aisphere-hub:feat-root-skill-iam-share
          imagePullPolicy: Always
          args: ["-conf", "/app/configs"]
          envFrom:
            - configMapRef:
                name: aisphere-hub-env
            - secretRef:
                name: aisphere-hub-secrets
          env:
            - name: TZ
              value: Asia/Shanghai
          ports:
            - name: http
              containerPort: 18001
            - name: grpc
              containerPort: 19001
            - name: metrics
              containerPort: 19090
          volumeMounts:
            - name: config
              mountPath: /app/configs
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: git-data
              mountPath: /var/lib/aisphere-hub/git
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 1Gi
