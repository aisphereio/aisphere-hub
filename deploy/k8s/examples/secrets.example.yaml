apiVersion: v1
kind: Secret
metadata:
  name: aisphere-hub-secrets
  namespace: aisphere
type: Opaque
stringData:
  HUB_POSTGRES_DSN: postgres://postgres:CHANGE_ME@postgres.aisphere.svc.cluster.local:5432/aisphere_hub?sslmode=disable
  HUB_REDIS_PASSWORD: CHANGE_ME
  HUB_S3_ACCESS_KEY: CHANGE_ME
  HUB_S3_SECRET_KEY: CHANGE_ME
  CASDOOR_CLIENT_ID: CHANGE_ME_CASDOOR_CLIENT_ID
  CASDOOR_CLIENT_SECRET: CHANGE_ME_CASDOOR_CLIENT_SECRET
  SPICEDB_TOKEN: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: casdoor-hub-oidc
  namespace: aisphere
type: Opaque
stringData:
  # Envoy Gateway requires this exact key name.
  client-secret: CHANGE_ME_CASDOOR_CLIENT_SECRET
