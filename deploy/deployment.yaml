apiVersion: apps/v1
kind: Deployment
metadata:
  name: aisphere-hub
  namespace: aisphere
  labels:
    app: aisphere-hub
    service: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aisphere-hub
  template:
    metadata:
      labels:
        app: aisphere-hub
        service: hub
    spec:
      serviceAccountName: aisphere-hub
      imagePullSecrets:
        - name: aliyun-registry
      volumes:
        - name: config
          configMap:
            name: aisphere-hub-config
        - name: git-data
          persistentVolumeClaim:
            claimName: aisphere-hub-git
      initContainers:
        - name: sysctl
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              sysctl -w fs.inotify.max_user_watches=524288
              sysctl -w fs.inotify.max_user_instances=512
          securityContext:
            privileged: true
      containers:
        - name: hub
          image: registry.cn-beijing.aliyuncs.com/ainfracn/aisphere-hub:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18001
              name: http
            - containerPort: 19001
              name: grpc
          env:
            - name: KERNEL_ENV
              value: "production"
            - name: TZ
              value: "Asia/Shanghai"
          volumeMounts:
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: git-data
              mountPath: /var/lib/aisphere-hub/git
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18001
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aisphere-hub
  namespace: aisphere
