syntax = "proto3";

package skill.v1;

import "aisphere/access/v1/access.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/aisphereio/aisphere-hub/api/skill/v1;skillv1";

// SkillService is the Git-native SkillHub management plane. Skill content,
// branches and release tags remain native Git/LFS data and are intentionally
// not represented by protobuf upload or draft-file RPCs.
service SkillService {
  rpc CreateSkill(CreateSkillRequest) returns (CreateSkillResponse) {
    option (google.api.http) = { post: "/v1/skills" body: "*" response_body: "skill" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "write" resource: "project:{org_id}/{project_id}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.create" risk: "high" }
    };
  }

  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse) {
    option (google.api.http) = { get: "/v1/skills" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:*" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.list" risk: "low" }
    };
  }

  rpc GetSkill(GetSkillRequest) returns (GetSkillResponse) {
    option (google.api.http) = { get: "/v1/skills/{name}" response_body: "skill" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.get" risk: "low" }
    };
  }

  rpc UpdateSkill(UpdateSkillRequest) returns (UpdateSkillResponse) {
    option (google.api.http) = { put: "/v1/skills/{name}" body: "*" response_body: "skill" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "edit" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.update" risk: "medium" }
    };
  }

  rpc UpdateSkillVisibility(UpdateSkillVisibilityRequest) returns (UpdateSkillVisibilityResponse) {
    option (google.api.http) = { post: "/v1/skills/{name}:visibility" body: "*" response_body: "skill" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.visibility.update" risk: "high" }
    };
  }

  rpc DeleteSkill(DeleteSkillRequest) returns (DeleteSkillResponse) {
    option (google.api.http) = { delete: "/v1/skills/{name}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.delete" risk: "high" }
    };
  }

  rpc ListSkillShares(ListSkillSharesRequest) returns (ListSkillSharesResponse) {
    option (google.api.http) = { get: "/v1/skills/{name}/shares" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.share.list" risk: "medium" }
    };
  }

  rpc CreateSkillShare(CreateSkillShareRequest) returns (CreateSkillShareResponse) {
    option (google.api.http) = { post: "/v1/skills/{name}/shares" body: "*" response_body: "share" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.share.create" risk: "high" }
    };
  }

  rpc DeleteSkillShare(DeleteSkillShareRequest) returns (DeleteSkillShareResponse) {
    option (google.api.http) = { delete: "/v1/skills/{name}/shares/{relation}/{subject_type}/{subject_id}" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.share.delete" risk: "high" }
    };
  }

  rpc CreatePullRequest(CreatePullRequestRequest) returns (CreatePullRequestResponse) {
    option (google.api.http) = { post: "/v1/skills/{name}/pull-requests" body: "*" response_body: "pull_request" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "edit" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.pull_request.create" risk: "medium" }
    };
  }

  rpc ListPullRequests(ListPullRequestsRequest) returns (ListPullRequestsResponse) {
    option (google.api.http) = { get: "/v1/skills/{name}/pull-requests" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.pull_request.list" risk: "low" }
    };
  }

  rpc GetPullRequest(GetPullRequestRequest) returns (GetPullRequestResponse) {
    option (google.api.http) = { get: "/v1/skills/{name}/pull-requests/{id}" response_body: "pull_request" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.pull_request.get" risk: "low" }
    };
  }

  rpc ReviewPullRequest(ReviewPullRequestRequest) returns (ReviewPullRequestResponse) {
    option (google.api.http) = { post: "/v1/skills/{name}/pull-requests/{id}:review" body: "*" response_body: "review" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "review" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.pull_request.review" risk: "medium" }
    };
  }

  rpc ClosePullRequest(ClosePullRequestRequest) returns (ClosePullRequestResponse) {
    option (google.api.http) = { post: "/v1/skills/{name}/pull-requests/{id}:close" body: "*" response_body: "pull_request" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "edit" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.pull_request.close" risk: "medium" }
    };
  }

  rpc MergePullRequest(MergePullRequestRequest) returns (MergePullRequestResponse) {
    option (google.api.http) = { post: "/v1/skills/{name}/pull-requests/{id}:merge" body: "*" response_body: "pull_request" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "publish" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.pull_request.merge" risk: "high" }
    };
  }

  rpc ListSkillReleases(ListSkillReleasesRequest) returns (ListSkillReleasesResponse) {
    option (google.api.http) = { get: "/v1/skills/{name}/releases" };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.release.list" risk: "low" }
    };
  }
}

message Skill {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string visibility = 4;
  string owner_id = 5;
  string org_id = 6;
  string project_id = 7;
  string default_branch = 8;
  string status = 9;
  google.protobuf.Timestamp create_time = 10;
  google.protobuf.Timestamp update_time = 11;
}

message CreateSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2;
  string description = 3;
  string visibility = 4;
  string project_id = 5 [(google.api.field_behavior) = REQUIRED];
  string org_id = 6 [(google.api.field_behavior) = REQUIRED];
}
message CreateSkillResponse { Skill skill = 1; }

message ListSkillsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string query = 3;
  string visibility = 4;
}
message ListSkillsResponse {
  repeated Skill skills = 1;
  string next_page_token = 2;
}

message GetSkillRequest { string name = 1 [(google.api.field_behavior) = REQUIRED]; }
message GetSkillResponse { Skill skill = 1; }

message UpdateSkillRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string display_name = 2;
  string description = 3;
}
message UpdateSkillResponse { Skill skill = 1; }

message UpdateSkillVisibilityRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string visibility = 2 [(google.api.field_behavior) = REQUIRED];
}
message UpdateSkillVisibilityResponse { Skill skill = 1; }

message DeleteSkillRequest { string name = 1 [(google.api.field_behavior) = REQUIRED]; }
message DeleteSkillResponse {}

message SkillShare {
  string skill_name = 1;
  string relation = 2;
  string subject_type = 3;
  string subject_id = 4;
  string subject_relation = 5;
  google.protobuf.Timestamp create_time = 6;
}

message ListSkillSharesRequest { string name = 1 [(google.api.field_behavior) = REQUIRED]; }
message ListSkillSharesResponse { repeated SkillShare shares = 1; }

message CreateSkillShareRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string relation = 2 [(google.api.field_behavior) = REQUIRED];
  string subject_type = 3 [(google.api.field_behavior) = REQUIRED];
  string subject_id = 4 [(google.api.field_behavior) = REQUIRED];
  string subject_relation = 5;
}
message CreateSkillShareResponse { SkillShare share = 1; }

message DeleteSkillShareRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string relation = 2 [(google.api.field_behavior) = REQUIRED];
  string subject_type = 3 [(google.api.field_behavior) = REQUIRED];
  string subject_id = 4 [(google.api.field_behavior) = REQUIRED];
}
message DeleteSkillShareResponse {}

message PullRequest {
  string id = 1;
  string skill_name = 2;
  string source_ref = 3;
  string target_ref = 4;
  string source_sha = 5;
  string target_sha = 6;
  string title = 7;
  string description = 8;
  string state = 9;
  string author_id = 10;
  string merged_sha = 11;
  google.protobuf.Timestamp create_time = 12;
  google.protobuf.Timestamp update_time = 13;
  google.protobuf.Timestamp merged_time = 14;
}

message PullRequestReview {
  string id = 1;
  string pull_request_id = 2;
  string reviewer_id = 3;
  string verdict = 4;
  string comment = 5;
  google.protobuf.Timestamp create_time = 6;
}

message CreatePullRequestRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string source_ref = 2 [(google.api.field_behavior) = REQUIRED];
  string title = 3 [(google.api.field_behavior) = REQUIRED];
  string description = 4;
}
message CreatePullRequestResponse { PullRequest pull_request = 1; }

message ListPullRequestsRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string state = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListPullRequestsResponse {
  repeated PullRequest pull_requests = 1;
  string next_page_token = 2;
}

message GetPullRequestRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}
message GetPullRequestResponse {
  PullRequest pull_request = 1;
  repeated PullRequestReview reviews = 2;
}

message ReviewPullRequestRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  string verdict = 3 [(google.api.field_behavior) = REQUIRED];
  string comment = 4;
}
message ReviewPullRequestResponse { PullRequestReview review = 1; }

message ClosePullRequestRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}
message ClosePullRequestResponse { PullRequest pull_request = 1; }

message MergePullRequestRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  string expected_target_sha = 3 [(google.api.field_behavior) = REQUIRED];
}
message MergePullRequestResponse { PullRequest pull_request = 1; }

message SkillRelease {
  string tag = 1;
  string commit_sha = 2;
  string manifest_sha256 = 3;
  google.protobuf.Timestamp create_time = 4;
}

message ListSkillReleasesRequest { string name = 1 [(google.api.field_behavior) = REQUIRED]; }
message ListSkillReleasesResponse { repeated SkillRelease releases = 1; }
