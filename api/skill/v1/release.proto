syntax = "proto3";

package skill.v1;

import "aisphere/access/v1/access.proto";
import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/timestamp.proto";
import "skill/v1/skill.proto";

option go_package = "github.com/aisphereio/aisphere-hub/api/skill/v1;skillv1";

// SkillReleaseService exposes immutable, Git-tag-backed Skill releases.
// Runtime consumers must resolve an exact SemVer release and commit SHA;
// floating branch selectors such as main/latest are intentionally unsupported.
// All routes are generated from this service definition.
service SkillReleaseService {
  rpc ResolveSkillRef(ResolveSkillRefRequest) returns (ResolveSkillRefResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{name}/refs:resolve"
      response_body: "ref"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.ref.resolve" risk: "low" }
    };
  }

  rpc CreateSkillRelease(CreateSkillReleaseRequest) returns (CreateSkillReleaseResponse) {
    option (google.api.http) = {
      post: "/v1/skills/{name}/releases"
      body: "*"
      response_body: "release"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "publish" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.release.create" risk: "high" }
    };
  }

  rpc GetSkillRelease(GetSkillReleaseRequest) returns (GetSkillReleaseResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{name}/releases/{version}"
      response_body: "release"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.release.get" risk: "low" }
    };
  }

  rpc ResolveSkillRelease(ResolveSkillReleaseRequest) returns (ResolveSkillReleaseResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{name}/releases/{version}:resolve"
      response_body: "release"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.release.resolve" risk: "low" }
    };
  }

  rpc ListSkillRefs(ListSkillRefsRequest) returns (ListSkillRefsResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{name}/refs"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.ref.list" risk: "low" }
    };
  }

  rpc ListSkillCommits(ListSkillCommitsRequest) returns (ListSkillCommitsResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{name}/commits"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.commit.list" risk: "low" }
    };
  }

  rpc CompareSkillRefs(CompareSkillRefsRequest) returns (CompareSkillRefsResponse) {
    option (google.api.http) = {
      get: "/v1/skills/{name}/compare"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "view" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.ref.compare" risk: "low" }
    };
  }

  // RestoreSkillRef creates a new commit whose tree exactly matches source_ref
  // and advances target_branch with compare-and-swap. Existing release tags
  // remain immutable; rollback is therefore auditable and non-destructive.
  rpc RestoreSkillRef(RestoreSkillRefRequest) returns (RestoreSkillRefResponse) {
    option (google.api.http) = {
      post: "/v1/skills/{name}:restore"
      body: "*"
    };
    option (aisphere.access.v1.policy) = {
      exposure: AUTHORIZED
      authz: { action: "manage" resource: "skill:{name}" audience: "hub-service" mode: CHECK_ONLY }
      audit: { enabled: true event: "hub.skill.ref.restore" risk: "high" }
    };
  }
}

message SkillRef {
  string ref = 1;
  string commit_sha = 2;
}

message ResolveSkillRefRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  // Defaults to refs/heads/main when omitted. Accepts "main" or a fully
  // qualified ref such as "refs/heads/main".
  string ref = 2;
}

message ResolveSkillRefResponse {
  SkillRef ref = 1;
}

message CreateSkillReleaseRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  // Accepts SemVer with or without the leading v; the server canonicalizes it.
  string version = 2 [(google.api.field_behavior) = REQUIRED];
  // Defaults to refs/heads/main when omitted.
  string source_ref = 3;
  // Compare-and-swap guard: publication fails when source_ref moved.
  string expected_commit_sha = 4 [(google.api.field_behavior) = REQUIRED];
  string release_notes = 5;
}

message CreateSkillReleaseResponse {
  SkillRelease release = 1;
}

message GetSkillReleaseRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string version = 2 [(google.api.field_behavior) = REQUIRED];
}

message GetSkillReleaseResponse {
  SkillRelease release = 1;
}

message ResolveSkillReleaseRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  // Exact SemVer only; ranges, branches and channels are not accepted.
  string version = 2 [(google.api.field_behavior) = REQUIRED];
}

message ResolveSkillReleaseResponse {
  SkillRelease release = 1;
}

message ListSkillRefsRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
}

message ListSkillRefsResponse {
  repeated SkillGitRef refs = 1;
}

message SkillGitRef {
  string name = 1;
  string full_ref = 2;
  string type = 3;
  string commit_sha = 4;
  bool is_default = 5;
}

message ListSkillCommitsRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string ref = 2;
  int32 page_size = 3;
  int32 offset = 4;
}

message ListSkillCommitsResponse {
  repeated SkillCommit commits = 1;
}

message SkillCommit {
  string commit_sha = 1;
  string tree_sha = 2;
  repeated string parent_shas = 3;
  string author_name = 4;
  string author_email = 5;
  string subject = 6;
  google.protobuf.Timestamp create_time = 7;
}

message CompareSkillRefsRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string base_ref = 2 [(google.api.field_behavior) = REQUIRED];
  string target_ref = 3 [(google.api.field_behavior) = REQUIRED];
}

message CompareSkillRefsResponse {
  SkillComparison comparison = 1;
}

message SkillComparison {
  string base_ref = 1;
  string target_ref = 2;
  string base_commit_sha = 3;
  string target_commit_sha = 4;
  string merge_base_sha = 5;
  repeated SkillDiffFile files = 6;
  string patch = 7;
  bool patch_truncated = 8;
}

message SkillDiffFile {
  string path = 1;
  string previous_path = 2;
  string status = 3;
  int64 additions = 4;
  int64 deletions = 5;
  bool binary = 6;
}

message RestoreSkillRefRequest {
  string name = 1 [(google.api.field_behavior) = REQUIRED];
  string source_ref = 2 [(google.api.field_behavior) = REQUIRED];
  string target_branch = 3;
  string expected_head_sha = 4 [(google.api.field_behavior) = REQUIRED];
  string commit_message = 5;
}

message RestoreSkillRefResponse {
  SkillCommit commit = 1;
  string target_ref = 2;
}
